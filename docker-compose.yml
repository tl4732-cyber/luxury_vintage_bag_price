services:  # services are the containers that will be created
  postgres:
    image: postgres:16-alpine 
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lvbp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lvbp_dev}
      POSTGRES_DB: ${POSTGRES_DB:-luxury_bags} 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lvbp} -d ${POSTGRES_DB:-luxury_bags}"]
      interval: 5s
      timeout: 5s 
      retries: 5

volumes:
  postgres_data:
